# Server Configuration
server.port=${PORT:8080}

# Database Configuration (Railway PostgreSQL)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:taskmanager}
spring.datasource.username=${PGUSER:taskuser}
spring.datasource.password=${PGPASSWORD:taskpass123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:8080}

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
