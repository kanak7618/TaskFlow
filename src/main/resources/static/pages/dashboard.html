<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title" id="welcome-title">Good morning! 👋</h1>
                <p class="page-subtitle">Here's what's happening with your team today.</p>
            </div>
            <a href="/pages/projects.html" class="btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Project
            </a>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card" style="--stat-color: #818cf8; --stat-bg: rgba(99,102,241,0.12);">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-projects">—</div>
                    <div class="stat-label">Total Projects</div>
                </div>
            </div>
            <div class="stat-card" style="--stat-color: #06b6d4; --stat-bg: rgba(6,182,212,0.12);">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-tasks">—</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
            </div>
            <div class="stat-card" style="--stat-color: #10b981; --stat-bg: rgba(16,185,129,0.12);">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-done">—</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>
            <div class="stat-card" style="--stat-color: #f59e0b; --stat-bg: rgba(245,158,11,0.12);">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-progress">—</div>
                    <div class="stat-label">In Progress</div>
                </div>
            </div>
            <div class="stat-card" style="--stat-color: #ef4444; --stat-bg: rgba(239,68,68,0.12);">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="stat-info">
                    <div class="stat-value" id="stat-overdue">—</div>
                    <div class="stat-label">Overdue</div>
                </div>
            </div>
        </div>

        <!-- Bottom Grid -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 8px;">
            <!-- Recent Tasks -->
            <div class="table-container">
                <div class="table-header">
                    <span class="table-title">📋 Recent Tasks</span>
                    <a href="/pages/tasks.html" style="font-size:0.75rem; color: var(--primary-light); text-decoration: none;">View all →</a>
                </div>
                <div id="recent-tasks-list" style="padding: 12px;">
                    <div class="empty-state"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- My Tasks -->
            <div class="table-container">
                <div class="table-header">
                    <span class="table-title">🎯 My Assigned Tasks</span>
                    <a href="/pages/tasks.html" style="font-size:0.75rem; color: var(--primary-light); text-decoration: none;">View all →</a>
                </div>
                <div id="my-tasks-list" style="padding: 12px;">
                    <div class="empty-state"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Recent Projects -->
        <div class="table-container" style="margin-top: 20px;">
            <div class="table-header">
                <span class="table-title">🗂️ Recent Projects</span>
                <a href="/pages/projects.html" style="font-size:0.75rem; color: var(--primary-light); text-decoration: none;">View all →</a>
            </div>
            <div id="recent-projects" style="padding: 16px;">
                <div class="empty-state"><div class="spinner"></div></div>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script>
        api.requireAuth();
        const user = api.getUser();

        // Greeting
        const hour = new Date().getHours();
        const greet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
        document.getElementById('welcome-title').textContent = `${greet}, ${user.fullName?.split(' ')[0] || 'there'}! 👋`;

        // Sidebar
        document.getElementById('sidebar-container').innerHTML = renderSidebar('dashboard');

        async function loadDashboard() {
            try {
                const data = await api.get('/dashboard');

                document.getElementById('stat-projects').textContent = data.totalProjects;
                document.getElementById('stat-tasks').textContent = data.totalTasks;
                document.getElementById('stat-done').textContent = data.completedTasks;
                document.getElementById('stat-progress').textContent = data.inProgressTasks;
                document.getElementById('stat-overdue').textContent = data.overdueTasks;

                // Recent Tasks
                const rt = document.getElementById('recent-tasks-list');
                if (!data.recentTasks?.length) {
                    rt.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No tasks yet</div></div>';
                } else {
                    rt.innerHTML = '<div class="task-list">' + data.recentTasks.slice(0,5).map(t => `
                        <div class="task-item" onclick="window.location.href='/pages/tasks.html'">
                            <div class="task-check ${t.status === 'DONE' ? 'done' : ''}"></div>
                            <div class="task-info">
                                <div class="task-title ${t.status === 'DONE' ? 'done' : ''}">${t.title}</div>
                                <div class="task-meta">
                                    ${getStatusBadge(t.status)}
                                    ${getPriorityBadge(t.priority)}
                                    <span>${t.project?.name || ''}</span>
                                </div>
                            </div>
                            ${t.overdue ? '<span class="badge badge-overdue">Overdue</span>' : ''}
                        </div>`).join('') + '</div>';
                }

                // My Tasks
                const mt = document.getElementById('my-tasks-list');
                if (!data.myTasks?.length) {
                    mt.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">No tasks assigned</div></div>';
                } else {
                    mt.innerHTML = '<div class="task-list">' + data.myTasks.map(t => `
                        <div class="task-item">
                            <div class="task-check ${t.status === 'DONE' ? 'done' : ''}"></div>
                            <div class="task-info">
                                <div class="task-title ${t.status === 'DONE' ? 'done' : ''}">${t.title}</div>
                                <div class="task-meta">
                                    ${getStatusBadge(t.status)}
                                    ${t.dueDate ? `<span>Due: ${formatDate(t.dueDate)}</span>` : ''}
                                </div>
                            </div>
                            ${t.overdue ? '<span class="badge badge-overdue">Overdue</span>' : ''}
                        </div>`).join('') + '</div>';
                }

                // Projects
                const rp = document.getElementById('recent-projects');
                if (!data.recentProjects?.length) {
                    rp.innerHTML = '<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">No projects yet</div><a href="/pages/projects.html" class="btn-primary">Create First Project</a></div>';
                } else {
                    rp.innerHTML = '<div class="projects-grid">' + data.recentProjects.map(p => {
                        const pct = p.totalTasks > 0 ? Math.round((p.completedTasks / p.totalTasks) * 100) : 0;
                        return `
                        <div class="project-card" onclick="window.location.href='/pages/projects.html?id=${p.id}'">
                            <div class="project-card-header">
                                <div class="project-card-name">${p.name}</div>
                                <span class="badge badge-member">${p.totalTasks} tasks</span>
                            </div>
                            <div class="project-card-desc">${p.description || 'No description'}</div>
                            <div class="project-progress">
                                <div class="progress-label">
                                    <span>Progress</span><span>${pct}%</span>
                                </div>
                                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                            </div>
                            <div class="project-card-footer">
                                <span>${p.members?.length || 0} members</span>
                                <span>${p.completedTasks}/${p.totalTasks} done</span>
                            </div>
                        </div>`;
                    }).join('') + '</div>';
                }
            } catch (err) {
                console.error(err);
            }
        }

        loadDashboard();
    </script>
</body>
</html>
