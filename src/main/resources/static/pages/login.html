<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/landing.css">
    <style>
        .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .bg-orbs::before { content: ''; position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.2), transparent); border-radius: 50%; top: -100px; right: -100px; filter: blur(60px); }
        .bg-orbs::after { content: ''; position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(139,92,246,0.15), transparent); border-radius: 50%; bottom: -50px; left: -50px; filter: blur(60px); }
        .auth-body { position: relative; }
        .auth-container { position: relative; z-index: 1; }
    </style>
</head>
<body class="auth-body">
    <div class="bg-orbs"></div>
    <div class="auth-container">
        <div class="auth-logo">
            <svg viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="12" fill="url(#lg)"/>
                <path d="M12 18h24M12 24h16M12 30h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="34" cy="30" r="6" fill="white" opacity="0.9"/>
                <defs><linearGradient id="lg" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
            </svg>
            <h1>TaskFlow</h1>
            <p>Team Task Manager</p>
        </div>

        <div class="auth-card">
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Sign in to your workspace</p>

            <div id="login-alert" class="alert alert-error hidden"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary w-full" id="login-btn" style="justify-content: center; margin-top: 8px;">
                    Sign In
                </button>
            </form>

            <p class="auth-footer-text">
                Don't have an account? <a href="/pages/signup.html">Create one free</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (api.getToken()) window.location.href = '/pages/dashboard.html';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert('login-alert');
            setLoading('login-btn', true, 'Sign In');

            try {
                const data = await api.post('/auth/login', {
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                });
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    id: data.userId, fullName: data.fullName,
                    email: data.email, role: data.role
                }));
                window.location.href = '/pages/dashboard.html';
            } catch (err) {
                showAlert('login-alert', err.message || 'Invalid email or password');
                setLoading('login-btn', false, 'Sign In');
            }
        });
    </script>
</body>
</html>
