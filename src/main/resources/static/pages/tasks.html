<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | TaskFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="app-body">
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Tasks</h1>
                <p class="page-subtitle" id="task-count">Loading...</p>
            </div>
            <button class="btn-primary" id="new-task-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Task
            </button>
        </div>

        <!-- View Toggle -->
        <div class="tabs">
            <button class="tab-btn active" id="tab-list" onclick="switchView('list')">📋 List View</button>
            <button class="tab-btn" id="tab-kanban" onclick="switchView('kanban')">🗃️ Kanban Board</button>
            <button class="tab-btn" id="tab-my" onclick="switchView('my')">🎯 My Tasks</button>
        </div>

        <!-- Filter bar -->
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
            <select id="filter-project" class="form-select" style="width:auto;min-width:180px;">
                <option value="">All Projects</option>
            </select>
            <select id="filter-status" class="form-select" style="width:auto;">
                <option value="">All Statuses</option>
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="IN_REVIEW">In Review</option>
                <option value="DONE">Done</option>
            </select>
            <select id="filter-priority" class="form-select" style="width:auto;">
                <option value="">All Priorities</option>
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="CRITICAL">Critical</option>
            </select>
        </div>

        <!-- Views -->
        <div id="view-list">
            <div id="tasks-list-container"><div class="empty-state"><div class="spinner"></div></div></div>
        </div>

        <div id="view-kanban" class="hidden">
            <div class="kanban-board">
                <div class="kanban-column">
                    <div class="kanban-col-header" style="color:#94a3b8;">📌 To Do <span class="col-count" id="k-todo-count">0</span></div>
                    <div class="kanban-tasks" id="k-todo"></div>
                </div>
                <div class="kanban-column">
                    <div class="kanban-col-header" style="color:#06b6d4;">⚡ In Progress <span class="col-count" id="k-progress-count">0</span></div>
                    <div class="kanban-tasks" id="k-progress"></div>
                </div>
                <div class="kanban-column">
                    <div class="kanban-col-header" style="color:#f59e0b;">👁️ In Review <span class="col-count" id="k-review-count">0</span></div>
                    <div class="kanban-tasks" id="k-review"></div>
                </div>
                <div class="kanban-column">
                    <div class="kanban-col-header" style="color:#10b981;">✅ Done <span class="col-count" id="k-done-count">0</span></div>
                    <div class="kanban-tasks" id="k-done"></div>
                </div>
            </div>
        </div>

        <div id="view-my" class="hidden">
            <div id="my-tasks-container"><div class="empty-state"><div class="spinner"></div></div></div>
        </div>
    </main>

    <!-- Task Modal -->
    <div id="task-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="task-modal-title">New Task</h3>
                <button class="modal-close" onclick="closeTaskModal()">✕</button>
            </div>
            <div id="task-alert" class="alert alert-error hidden"></div>
            <form id="task-form">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="task-title" class="form-input" placeholder="Task title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="task-desc" class="form-textarea" placeholder="Details..." style="min-height:80px;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Project *</label>
                    <select id="task-project" class="form-select" required onchange="onProjectChange()"></select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select id="task-status" class="form-select">
                            <option value="TODO">To Do</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="IN_REVIEW">In Review</option>
                            <option value="DONE">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <select id="task-priority" class="form-select">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label class="form-label">Due Date</label>
                        <input type="date" id="task-due" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Assign To</label>
                        <select id="task-assignee" class="form-select">
                            <option value="">Unassigned</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full" id="task-submit-btn" style="justify-content:center;">Create Task</button>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        api.requireAuth();
        document.getElementById('sidebar-container').innerHTML = renderSidebar('tasks');

        let allTasks = [], allProjects = [], myTasks = [], editingTaskId = null;
        let currentView = 'list';

        async function loadData() {
            try {
                allProjects = await api.get('/projects');
                myTasks = await api.get('/tasks/my-tasks');

                // Load tasks for all projects
                const taskArrays = await Promise.all(allProjects.map(p => api.get(`/tasks/project/${p.id}`).catch(() => [])));
                allTasks = taskArrays.flat();

                // Populate project filters
                const fp = document.getElementById('filter-project');
                const tp = document.getElementById('task-project');
                fp.innerHTML = '<option value="">All Projects</option>' + allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
                tp.innerHTML = '<option value="">Select project...</option>' + allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

                document.getElementById('task-count').textContent = `${allTasks.length} task${allTasks.length !== 1 ? 's' : ''}`;
                renderCurrentView();
            } catch(e) { console.error(e); }
        }

        function getFilteredTasks() {
            let tasks = [...allTasks];
            const proj = document.getElementById('filter-project').value;
            const status = document.getElementById('filter-status').value;
            const priority = document.getElementById('filter-priority').value;
            if (proj) tasks = tasks.filter(t => t.project?.id == proj);
            if (status) tasks = tasks.filter(t => t.status === status);
            if (priority) tasks = tasks.filter(t => t.priority === priority);
            return tasks;
        }

        function renderCurrentView() {
            if (currentView === 'list') renderList();
            else if (currentView === 'kanban') renderKanban();
            else renderMyTasks();
        }

        function renderList() {
            const tasks = getFilteredTasks();
            const c = document.getElementById('tasks-list-container');
            if (!tasks.length) {
                c.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">No tasks found</div><div class="empty-desc">Create a task or adjust filters</div></div>';
                return;
            }
            c.innerHTML = '<div class="table-container"><table><thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th>Assignee</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>' +
                tasks.map(t => `<tr>
                    <td><div style="font-weight:500;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title}</div></td>
                    <td><span style="font-size:0.8rem;color:var(--text-secondary);">${t.project?.name || '—'}</span></td>
                    <td>${getStatusBadge(t.status)}</td>
                    <td>${getPriorityBadge(t.priority)}</td>
                    <td><span style="font-size:0.8rem;">${t.assignee?.fullName || '—'}</span></td>
                    <td>
                        <span style="font-size:0.8rem;${t.overdue ? 'color:var(--accent-red);' : 'color:var(--text-muted);'}">${formatDate(t.dueDate)}</span>
                        ${t.overdue ? '<span class="badge badge-overdue" style="margin-left:4px;">Late</span>' : ''}
                    </td>
                    <td>
                        <div style="display:flex;gap:6px;">
                            <select onchange="quickStatus(${t.id}, this.value)" class="form-select" style="padding:4px 8px;font-size:0.7rem;width:auto;">
                                <option value="TODO" ${t.status==='TODO'?'selected':''}>To Do</option>
                                <option value="IN_PROGRESS" ${t.status==='IN_PROGRESS'?'selected':''}>In Progress</option>
                                <option value="IN_REVIEW" ${t.status==='IN_REVIEW'?'selected':''}>In Review</option>
                                <option value="DONE" ${t.status==='DONE'?'selected':''}>Done</option>
                            </select>
                            <button onclick="deleteTask(${t.id})" class="btn-danger" style="padding:4px 8px;">🗑</button>
                        </div>
                    </td>
                </tr>`).join('') + '</tbody></table></div>';
        }

        function renderKanban() {
            const tasks = getFilteredTasks();
            const groups = { TODO: [], IN_PROGRESS: [], IN_REVIEW: [], DONE: [] };
            tasks.forEach(t => { if (groups[t.status]) groups[t.status].push(t); });

            const renderCol = (arr) => arr.map(t => `
                <div class="kanban-task">
                    <div class="kanban-task-title">${t.title}</div>
                    <div class="kanban-task-meta">
                        ${getPriorityBadge(t.priority)}
                        <span>${t.assignee?.fullName || 'Unassigned'}</span>
                    </div>
                    ${t.overdue ? '<div style="margin-top:6px;"><span class="badge badge-overdue">Overdue</span></div>' : ''}
                </div>`).join('') || '<div style="color:var(--text-muted);font-size:0.75rem;text-align:center;padding:20px;">Empty</div>';

            document.getElementById('k-todo').innerHTML = renderCol(groups.TODO);
            document.getElementById('k-progress').innerHTML = renderCol(groups.IN_PROGRESS);
            document.getElementById('k-review').innerHTML = renderCol(groups.IN_REVIEW);
            document.getElementById('k-done').innerHTML = renderCol(groups.DONE);
            document.getElementById('k-todo-count').textContent = groups.TODO.length;
            document.getElementById('k-progress-count').textContent = groups.IN_PROGRESS.length;
            document.getElementById('k-review-count').textContent = groups.IN_REVIEW.length;
            document.getElementById('k-done-count').textContent = groups.DONE.length;
        }

        function renderMyTasks() {
            const c = document.getElementById('my-tasks-container');
            if (!myTasks.length) {
                c.innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">No tasks assigned to you</div></div>';
                return;
            }
            c.innerHTML = '<div class="task-list">' + myTasks.map(t => `
                <div class="task-item">
                    <div class="task-check ${t.status==='DONE'?'done':''}"></div>
                    <div class="task-info">
                        <div class="task-title ${t.status==='DONE'?'done':''}">${t.title}</div>
                        <div class="task-meta">${getStatusBadge(t.status)} ${getPriorityBadge(t.priority)} <span>${t.project?.name}</span> ${t.dueDate?`<span>Due: ${formatDate(t.dueDate)}</span>`:''}</div>
                    </div>
                    <div class="task-actions">
                        ${t.overdue ? '<span class="badge badge-overdue">Overdue</span>' : ''}
                        <select onchange="quickStatus(${t.id}, this.value)" class="form-select" style="padding:4px 8px;font-size:0.7rem;width:auto;">
                            <option value="TODO" ${t.status==='TODO'?'selected':''}>To Do</option>
                            <option value="IN_PROGRESS" ${t.status==='IN_PROGRESS'?'selected':''}>In Progress</option>
                            <option value="IN_REVIEW" ${t.status==='IN_REVIEW'?'selected':''}>In Review</option>
                            <option value="DONE" ${t.status==='DONE'?'selected':''}>Done</option>
                        </select>
                    </div>
                </div>`).join('') + '</div>';
        }

        function switchView(v) {
            currentView = v;
            ['list','kanban','my'].forEach(x => {
                document.getElementById(`view-${x}`).classList.toggle('hidden', x !== v);
                document.getElementById(`tab-${x}`).classList.toggle('active', x === v);
            });
            renderCurrentView();
        }

        ['filter-project','filter-status','filter-priority'].forEach(id => {
            document.getElementById(id).onchange = renderCurrentView;
        });

        async function quickStatus(id, status) {
            try {
                await api.patch(`/tasks/${id}/status`, { status });
                await loadData();
            } catch(e) { alert(e.message); }
        }

        async function deleteTask(id) {
            if (!confirm('Delete this task?')) return;
            try { await api.delete(`/tasks/${id}`); await loadData(); }
            catch(e) { alert(e.message); }
        }

        function openTaskModal() {
            editingTaskId = null;
            document.getElementById('task-modal-title').textContent = 'New Task';
            document.getElementById('task-form').reset();
            document.getElementById('task-priority').value = 'MEDIUM';
            document.getElementById('task-status').value = 'TODO';
            hideAlert('task-alert');
            document.getElementById('task-modal').classList.remove('hidden');
        }

        function closeTaskModal() { document.getElementById('task-modal').classList.add('hidden'); }

        function onProjectChange() {
            const pid = document.getElementById('task-project').value;
            const p = allProjects.find(p => p.id == pid);
            document.getElementById('task-assignee').innerHTML = '<option value="">Unassigned</option>' +
                (p?.members || []).map(m => `<option value="${m.id}">${m.fullName}</option>`).join('');
        }

        document.getElementById('new-task-btn').onclick = openTaskModal;

        document.getElementById('task-form').onsubmit = async (e) => {
            e.preventDefault();
            setLoading('task-submit-btn', true, 'Create Task');
            try {
                const assigneeId = document.getElementById('task-assignee').value;
                await api.post('/tasks', {
                    title: document.getElementById('task-title').value.trim(),
                    description: document.getElementById('task-desc').value.trim(),
                    projectId: parseInt(document.getElementById('task-project').value),
                    status: document.getElementById('task-status').value,
                    priority: document.getElementById('task-priority').value,
                    dueDate: document.getElementById('task-due').value || null,
                    assigneeId: assigneeId ? parseInt(assigneeId) : null
                });
                closeTaskModal();
                await loadData();
                setLoading('task-submit-btn', false, 'Create Task');
            } catch(e) { showAlert('task-alert', e.message); setLoading('task-submit-btn', false, 'Create Task'); }
        };

        loadData();
    </script>
</body>
</html>
